name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_repository_owner: ${{ github.repository_owner }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get last successful commit hash
        id: last-commit
        uses: actions/cache@v3
        with:
          path: .last-commit
          key: last-successful-commit
          restore-keys: |
            last-successful-commit

      - name: Detect changed Terraform projects
        id: detect
        run: |
          # Get current commit hash
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current commit: $CURRENT_COMMIT"

          # Check if we have a last successful commit
          if [ -f .last-commit/last-commit.txt ]; then
            LAST_COMMIT=$(cat .last-commit/last-commit.txt)
            echo "Last successful commit: $LAST_COMMIT"
            
            # Verify the last commit exists in the current repository
            if ! git rev-parse --verify $LAST_COMMIT >/dev/null 2>&1; then
              echo "Warning: Last successful commit $LAST_COMMIT not found in repository"
              echo "This might be due to force push or repository history rewrite"
              echo "Deploying all Terraform projects as fallback"
              CHANGED_DIRS=$(find infra/ -name "*.tf" -type f | cut -d/ -f1-3 | sort -u)
              echo "All Terraform directories:"
              echo "$CHANGED_DIRS"
            elif [ "$LAST_COMMIT" != "$CURRENT_COMMIT" ]; then
              echo "Checking for changes between $LAST_COMMIT and $CURRENT_COMMIT"
              
              # Get all changed files
              CHANGED_FILES=$(git diff --name-only $LAST_COMMIT HEAD)
              echo "All changed files:"
              echo "$CHANGED_FILES"
              
              # Filter for Terraform files and get directories
              CHANGED_DIRS=$(echo "$CHANGED_FILES" | grep '^infra/.*\.tf$' | cut -d/ -f1-3 | sort -u)
              echo "Changed Terraform directories:"
              echo "$CHANGED_DIRS"
            else
              echo "No changes since last successful commit"
              CHANGED_DIRS=""
            fi
          else
            echo "No last successful commit found - deploying all Terraform projects"
            # Find all Terraform directories
            CHANGED_DIRS=$(find infra/ -name "*.tf" -type f | cut -d/ -f1-3 | sort -u)
            echo "All Terraform directories:"
            echo "$CHANGED_DIRS"
          fi

          echo "dirs=$CHANGED_DIRS" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: steps.detect.outputs.dirs != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.INFRASTRUCTURE_DEPLOY_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.detect.outputs.dirs != ''
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Deploy changed projects
        if: steps.detect.outputs.dirs != ''
        run: |
          for dir in ${{ steps.detect.outputs.dirs }}; do
            echo "Deploying $dir"
            cd "$dir"
            terraform init -input=false
            terraform plan -input=false
            terraform apply -input=false -auto-approve
            cd -
          done

      - name: No changes to deploy
        if: steps.detect.outputs.dirs == ''
        run: |
          echo "No Terraform changes detected - skipping deployment"

      - name: Save successful commit hash
        if: success()
        run: |
          mkdir -p .last-commit
          git rev-parse HEAD > .last-commit/last-commit.txt
          echo "Saved successful commit: $(cat .last-commit/last-commit.txt)"

      - name: Cache successful commit hash
        if: success()
        uses: actions/cache@v3
        with:
          path: .last-commit
          key: last-successful-commit
