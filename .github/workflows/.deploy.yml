name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_repository_owner: ${{ github.repository_owner }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch only current and previous commit

      - name: Detect changed Terraform projects
        id: detect
        run: |
          # Get current and previous commit hashes
          CURRENT_COMMIT=$(git rev-parse HEAD)
          PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
          
          echo "Current commit: $CURRENT_COMMIT"
          echo "Previous commit: $PREVIOUS_COMMIT"
          
          # Compare changes between current and previous commit
          echo "Checking for changes between $PREVIOUS_COMMIT and $CURRENT_COMMIT"
          
          # Get changed files using git diff
          CHANGED_FILES=$(git diff --name-only $PREVIOUS_COMMIT $CURRENT_COMMIT)
          echo "All changed files:"
          echo "$CHANGED_FILES"
          
          # Filter for Terraform files and get directories
          CHANGED_DIRS=$(echo "$CHANGED_FILES" | grep '^infra/.*\.tf$' | cut -d/ -f1-3 | sort -u)
          echo "Changed Terraform directories:"
          echo "$CHANGED_DIRS"
          
          echo "dirs=$CHANGED_DIRS" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: steps.detect.outputs.dirs != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.INFRASTRUCTURE_DEPLOY_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.detect.outputs.dirs != ''
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Deploy changed projects
        if: steps.detect.outputs.dirs != ''
        run: |
          for dir in ${{ steps.detect.outputs.dirs }}; do
            echo "Deploying $dir"
            cd "$dir"
            terraform init -input=false
            terraform plan -input=false
            terraform apply -input=false -auto-approve
            cd -
          done

      - name: No changes to deploy
        if: steps.detect.outputs.dirs == ''
        run: |
          echo "No Terraform changes detected - skipping deployment"
